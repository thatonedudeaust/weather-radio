<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Secret Sender — Mount Holly Weather Radio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0a0f1a;
      color: #00ff88;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: #00ccff;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.75rem;
      color: #447766;
      letter-spacing: 0.15em;
      margin-bottom: 32px;
    }

    .panel {
      background: #0d1a14;
      border: 1px solid #00ff8844;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 540px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: #447766;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      background: #060e08;
      border: 1px solid #00ff8822;
      border-radius: 6px;
      color: #00ff88;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #00ff8866;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    select option {
      background: #0a0f1a;
      color: #00ff88;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      background: #0d1a14;
      border: 1px solid #00ff8866;
      border-radius: 8px;
      color: #00ff88;
      font-family: monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 12px 8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover  { background: #142b1e; border-color: #00ff88; }
    button:active { background: #1a3a28; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .send-btn {
      border-color: #00ccff88;
      color: #00ccff;
    }
    .send-btn:hover { background: #0d1e2b; border-color: #00ccff; }

    .clear-btn {
      border-color: #ff444466;
      color: #ff6666;
    }
    .clear-btn:hover { background: #1a0d0d; border-color: #ff4444; }

    .status-line {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #447766;
      margin-top: 16px;
      min-height: 18px;
      text-align: center;
    }

    .status-line.success { color: #00ff88; }
    .status-line.error   { color: #ff4444; }
    .status-line.sending { color: #ffaa00; }

    .preview-box {
      background: #060e08;
      border: 1px solid #00ff8822;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.75rem;
      color: #88ffbb;
      margin-top: 18px;
      min-height: 40px;
      line-height: 1.6;
    }

    .preview-label {
      font-size: 0.65rem;
      color: #334455;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .divider {
      border: none;
      border-top: 1px solid #00ff8811;
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <h1>&#x25A0; Secret Sender</h1>
  <div class="subtitle">MANUAL ALERT PANEL — KIH28 WEATHER RADIO</div>

  <div class="panel">

    <div class="field">
      <label>Secret Key</label>
      <input type="password" id="secret-key" placeholder="Enter secret key..." />
    </div>

    <hr class="divider">

    <div class="field">
      <label>Alert Type</label>
      <select id="alert-type">
        <option value="Severe Thunderstorm Warning">Severe Thunderstorm Warning</option>
        <option value="Tornado Warning">Tornado Warning</option>
        <option value="Tornado Watch">Tornado Watch</option>
        <option value="Severe Thunderstorm Watch">Severe Thunderstorm Watch</option>
        <option value="Flash Flood Warning">Flash Flood Warning</option>
        <option value="Flash Flood Watch">Flash Flood Watch</option>
        <option value="Flood Warning">Flood Warning</option>
        <option value="Winter Storm Warning">Winter Storm Warning</option>
        <option value="Winter Storm Watch">Winter Storm Watch</option>
        <option value="Blizzard Warning">Blizzard Warning</option>
        <option value="Ice Storm Warning">Ice Storm Warning</option>
        <option value="Wind Advisory">Wind Advisory</option>
        <option value="High Wind Warning">High Wind Warning</option>
        <option value="Dense Fog Advisory">Dense Fog Advisory</option>
        <option value="Heat Advisory">Heat Advisory</option>
        <option value="Excessive Heat Warning">Excessive Heat Warning</option>
        <option value="Freeze Warning">Freeze Warning</option>
        <option value="Frost Advisory">Frost Advisory</option>
        <option value="Special Weather Statement">Special Weather Statement</option>
        <option value="Custom">Custom (type below)</option>
      </select>
    </div>

    <div class="field" id="custom-type-field" style="display:none;">
      <label>Custom Alert Type</label>
      <input type="text" id="custom-type" placeholder="e.g. Dust Storm Warning" />
    </div>

    <div class="field">
      <label>Alert Message</label>
      <textarea id="alert-message" placeholder="Describe the alert details here..."></textarea>
    </div>

    <div class="field">
      <label>Affected Area</label>
      <input type="text" id="alert-area" placeholder="e.g. Burlington County, NJ" value="Burlington, Camden, and Gloucester Counties in New Jersey" />
    </div>

    <div class="field">
      <label>Instructions (optional)</label>
      <input type="text" id="alert-instructions" placeholder="e.g. Move to an interior room on the lowest floor." />
    </div>

    <hr class="divider">

    <div class="preview-label">TTS PREVIEW</div>
    <div class="preview-box" id="preview-text">Fill in the fields above to see a preview...</div>

    <div class="buttons">
      <button class="send-btn" onclick="sendAlert()">&#x25B6; Send Alert</button>
      <button class="clear-btn" onclick="clearAlert()">&#x25A0; Clear Alert</button>
    </div>

    <div id="status" class="status-line">READY</div>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxB2X7tWZt1u0bCrrjU2Azy0PN37mUftKafRm7357rkK_cag3g_jwSYdTRvQ-bnCn6s/exec";
  const SECRET_KEY = "KIH28-SECRET-2026";

  // Show/hide custom type field
  document.getElementById('alert-type').addEventListener('change', function() {
    const customField = document.getElementById('custom-type-field');
    customField.style.display = this.value === 'Custom' ? 'block' : 'none';
    updatePreview();
  });

  // Live preview update
  ['alert-type', 'custom-type', 'alert-message', 'alert-area', 'alert-instructions'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', updatePreview);
    document.getElementById(id).addEventListener('change', updatePreview);
  });

  function getAlertType() {
    const sel = document.getElementById('alert-type').value;
    if (sel === 'Custom') {
      return document.getElementById('custom-type').value.trim() || 'Custom Alert';
    }
    return sel;
  }

  function buildTTSText() {
    const type         = getAlertType();
    const message      = document.getElementById('alert-message').value.trim();
    const area         = document.getElementById('alert-area').value.trim();
    const instructions = document.getElementById('alert-instructions').value.trim();

    let text = `Manually issued. The Mount Holly Weather Radio has issued a ${type}.`;
    if (area)         text += ` This alert affects ${area}.`;
    if (message)      text += ` ${message}`;
    if (instructions) text += ` Instructions: ${instructions}`;
    return text;
  }

  function updatePreview() {
    document.getElementById('preview-text').textContent = buildTTSText();
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status-line' + (cls ? ' ' + cls : '');
  }

  function sendAlert() {
    const key = document.getElementById('secret-key').value.trim();
    if (!key) {
      setStatus('ERROR: Enter your secret key first.', 'error');
      return;
    }
    if (key !== SECRET_KEY) {
      setStatus('ERROR: Wrong secret key.', 'error');
      return;
    }

    const ttsText = buildTTSText();
    if (!ttsText) {
      setStatus('ERROR: Fill in the alert details first.', 'error');
      return;
    }

    setStatus('SENDING...', 'sending');

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        secret: key,
        alert:  ttsText,
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        setStatus('ALERT SENT — will broadcast on next cycle', 'success');
      } else {
        setStatus('ERROR: ' + (data.error || 'Unknown error'), 'error');
      }
    })
    .catch(err => {
      setStatus('ERROR: ' + err.message, 'error');
    });
  }

  function clearAlert() {
    const key = document.getElementById('secret-key').value.trim();
    if (!key) {
      setStatus('ERROR: Enter your secret key first.', 'error');
      return;
    }
    if (key !== SECRET_KEY) {
      setStatus('ERROR: Wrong secret key.', 'error');
      return;
    }

    setStatus('CLEARING...', 'sending');

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        secret: key,
        clear:  true,
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        setStatus('ALERT CLEARED', 'success');
      } else {
        setStatus('ERROR: ' + (data.error || 'Unknown error'), 'error');
      }
    })
    .catch(err => {
      setStatus('ERROR: ' + err.message, 'error');
    });
  }

  // Init preview
  updatePreview();
</script>
</body>
</html>
